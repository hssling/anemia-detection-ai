# data/dataset_registry.yaml
# Declarative registry of all public anemia image datasets.
# Each entry is fetched by download_datasets.py.
# All kaggle_ids verified 2026-03-24.

datasets:

  - id: cp_anemic_ghana
    name: "CP-AnemiC (A Conjunctival Pallor) Dataset from Ghana"
    source: mendeley
    mendeley_id: "m53vz6b7fx"
    version: 1
    site: conjunctiva
    label_type: hb_and_binary
    labels_csv: "Anemia_Data_Collection_Sheet.xlsx"
    filename_column: "IMAGE_ID"
    hb_column: "HB_LEVEL"
    anemia_class_column: "Severity"
    age_group: child
    notes: "Public Hb-labeled conjunctival dataset from Ghana; downloaded as zip containing a nested RAR archive"

  - id: ghana_fingernails
    name: "Detection of Anemia using Colour of the Fingernails Image Datasets from Ghana"
    source: mendeley
    mendeley_id: "2xx4j3kjg2"
    version: 1
    site: nailbed
    label_type: binary
    age_group: child
    notes: "Public nail-bed binary dataset from Ghana; useful for binary pretraining but not Hb regression"

  - id: imagehb_contact
    name: "ImageHB"
    source: manual
    manual_url: "https://bdtd.github.io/ImageHB/"
    site: conjunctiva
    label_type: hb_and_binary
    age_group: child
    notes: "Large multi-site Hb-labeled dataset with conjunctiva, palm, tongue, and nailbed images; full cohort requires direct request, sample dataset available from the project site"

  - id: eyes_defy_anemia
    name: "Eyes Defy Anemia"
    source: kaggle
    kaggle_id: "harshwardhanfartale/eyes-defy-anemia"
    site: conjunctiva
    label_type: binary
    notes: "Large conjunctival dataset; 666 GB — use --dataset-id for selective download in CI"

  - id: eye_conjunctiva
    name: "Eye-Conjunctiva Dataset"
    source: kaggle
    kaggle_id: "nadiwidi/eyeconjunctiva"
    site: conjunctiva
    label_type: binary
    notes: "Conjunctival images; 1.7 MB — suitable for CI pipeline test"

  - id: anemiadataset
    name: "Eye Images Dataset (Anemia Prediction)"
    source: kaggle
    kaggle_id: "nahiyan1402/anemiadataset"
    site: conjunctiva
    label_type: binary
    notes: "Eye images for anemia prediction; 2.2 MB"

  - id: balanced_conjunctiva
    name: "Balanced Conjunctiva Dataset"
    source: kaggle
    kaggle_id: "ramya125g/balanced-conjunctiva-dataset"
    site: conjunctiva
    label_type: binary
    notes: "Balanced conjunctival images; 111 MB"

  - id: eye_anemia_recent
    name: "Eye Anemia Dataset (2026)"
    source: kaggle
    kaggle_id: "dratehillary/eye-anemia-dataset"
    site: conjunctiva
    label_type: binary
    notes: "Recent conjunctival dataset; 1.8 MB"

  - id: anemia_palpebral
    name: "Anemia Palpebral"
    source: kaggle
    kaggle_id: "adityachourasia1/anemia-palpebral"
    site: conjunctiva
    label_type: binary
    notes: "Palpebral conjunctival images; 527 MB — includes nail-bed subset"
