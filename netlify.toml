[build]
  publish = "frontend"
  command = "echo 'Static site - no build step'"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_PATHS = ".github/workflows,docs,kaggle_notebook.ipynb,render.yaml,data/README.md"
  SECRETS_SCAN_OMIT_KEYS = "HF_TOKEN,KAGGLE_KEY,KAGGLE_USERNAME,WANDB_API_KEY,RENDER_DEPLOY_HOOK_URL"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: blob:; connect-src 'self' https://*.hf.space https://*.onrender.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'"

[[redirects]]
  from = "/api/*"
  to = "https://anemia-detection-ai-1.onrender.com/:splat"
  status = 200
  force = false
