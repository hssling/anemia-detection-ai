# .github/workflows/data-pipeline.yml
name: Data Pipeline

on:
  workflow_dispatch:
    inputs:
      dataset_id:
        description: "Download only this dataset ID (leave blank for all)"
        required: false
        default: "cp_anemic_ghana"
      skip_download:
        description: "Skip download step (1=skip, 0=run)"
        required: false
        default: "0"
      skip_quality:
        description: "Skip quality filter (1=skip for small/test datasets, 0=run)"
        required: false
        default: "1"
      hf_dataset_repo:
        description: "HF dataset repo to publish to"
        required: false
        default: "hssling/anemia-conjunctiva-nailbed"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-data.txt

      - name: Install archive extraction tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unar p7zip-full

      - name: Configure Kaggle credentials
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' \
            > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Run data pipeline
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}
          DATASET_ID: ${{ github.event.inputs.dataset_id }}
          SKIP_DOWNLOAD: ${{ github.event.inputs.skip_download }}
          SKIP_QUALITY: ${{ github.event.inputs.skip_quality }}
          HF_DATASET_REPO: ${{ github.event.inputs.hf_dataset_repo }}
        run: bash data/data_pipeline.sh
