name: Deploy Inference to HF Space

env:
  HF_SPACE_ID: hssling/anemia-screening

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "inference/**"
      - "training/**"
      - ".github/workflows/deploy-hf-space.yml"

jobs:
  deploy-space:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deploy dependency
        run: pip install huggingface_hub

      - name: Build Space payload
        shell: bash
        run: |
          rm -rf .hf-space
          mkdir -p .hf-space
          cp inference/Dockerfile .hf-space/Dockerfile
          cp -R inference .hf-space/inference
          cp -R training .hf-space/training
          cat <<'EOF' > .hf-space/README.md
          ---
          title: AnemiaScan
          emoji: 🩸
          colorFrom: red
          colorTo: pink
          sdk: docker
          app_port: 7860
          pinned: false
          license: mit
          ---

          # AnemiaScan

          Research-only non-invasive anemia screening demo.

          Concept, design, build, training, deployment, testing by: Dr Siddalingaiah H S, Professor, Community Medicine, Shridevi Institute of Medical Sciences and Research Hospital, Tumkur, hssling@yahoo.com, 8941087719.

          ORCID: 0000-0002-4771-8285
          EOF

      - name: Upload to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          repo_id = os.environ["HF_SPACE_ID"]
          token = os.environ["HF_TOKEN"]
          api = HfApi(token=token)
          api.upload_folder(
              folder_path=".hf-space",
              repo_id=repo_id,
              repo_type="space",
              commit_message="Deploy inference service from GitHub Actions",
          )
          print(f"Uploaded Docker Space payload to {repo_id}")
          PY
